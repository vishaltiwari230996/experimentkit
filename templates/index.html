<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Experiment Kit — Assembly Assistant</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Mobile sidebar overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar: Step Navigator -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 id="sidebarTitle">🔬 Experiment Kit</h2>
                <p class="sidebar-subtitle" id="sidebarSubtitle">Loading...</p>
                <div class="kit-selector-wrapper">
                    <select id="kitSelector" class="kit-selector">
                        <!-- Populated by JS -->
                    </select>
                </div>
            </div>
            <div class="step-list" id="stepList">
                <!-- Steps populated by JS -->
            </div>
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">☰</button>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <button class="mobile-menu" id="mobileMenu" aria-label="Open menu">☰</button>
                <div class="header-info">
                    <h1>STEM Assembly Assistant</h1>
                    <span class="header-badge" id="headerBadge">Experiment Kit • AI-Powered • NCERT Science</span>
                </div>
                <div class="header-step" id="headerStep">
                    <span>No step selected</span>
                </div>
                <button class="reset-btn" id="resetBtn" title="Reset Chat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 4v6h6M23 20v-6h-6"/>
                        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
                    </svg>
                    Reset
                </button>
            </header>

            <div class="chat-messages" id="chatMessages">
                <!-- Messages populated by JS -->
            </div>

            <!-- Quick Actions -->
            <div class="quick-actions" id="quickActions">
                <button class="quick-btn" data-msg="Show all steps">📋 All Steps</button>
                <button class="quick-btn" data-msg="Start from step 1">🚀 Start</button>
                <button class="quick-btn" data-msg="What components are in the kit?">🧰 Components</button>
                <button class="quick-btn" data-msg="What will I learn from this experiment?">📖 Learning</button>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <textarea 
                        id="userInput" 
                        placeholder="Ask about any experiment step, science concept, or request sub-steps..." 
                        rows="1"
                        maxlength="500"
                    ></textarea>
                    <button id="sendBtn" class="send-btn" aria-label="Send message">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">Ask about steps, sub-steps, concepts, safety tips, or component details</p>
            </div>
        </main>
    </div>

    <script src="/static/js/chat.js?v=2"></script>
</body>
</html>
